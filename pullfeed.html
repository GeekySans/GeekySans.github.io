<!DOCTYPE html>
<html>
<head>
    <title>GeekySans's Digital Playground</title>
    <link href="styles.css" type="text/css" rel="stylesheet" />
    <script src="scripts.js"></script>
    <iframe width="0%" height="0" scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/1374487636&color=%23ff5500&auto_play=true&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true&visual=true">
    </iframe>
</head>
    <body>
    <center>
    <div id="demo"></div>
    <div id="demo2"></div>
    <div id="demo3"></div>
    <hr>
    <footer>
<script>
var parser, xmlDoc;
var text = "<bookstore><book>" +
"<title>Everyday Italian</title>" +
"<author>Giada De Laurentiis</author>" +
"<year>2005</year>" +
"</book></bookstore>";

parser = new DOMParser();
xmlDoc = parser.parseFromString(text,"text/xml");

document.getElementById("demo").innerHTML = "<h1>" +
xmlDoc.getElementsByTagName("title")[0].childNodes[0].nodeValue + "</h1>";
document.getElementById("demo2").innerHTML = "<h3>" +
xmlDoc.getElementsByTagName("author")[0].childNodes[0].nodeValue + "</h3>";
document.getElementById("demo3").innerHTML = "<code> Year: " +
xmlDoc.getElementsByTagName("year")[0].childNodes[0].nodeValue + "</code>";
</script>
    </footer>
    </center>
    </body>
</html>
